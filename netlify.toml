[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Proxy API requests to Netlify serverless function
[[redirects]]
  from = "/api/bookings"
  to = "/.netlify/functions/bookings"
  status = 200

# Handle Single Page Application (SPA) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
